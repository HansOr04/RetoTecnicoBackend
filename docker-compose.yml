services:
  ms-clientes:
    build: ./ms-clientes
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - banco-network

  ms-cuentas:
    build: ./ms-cuentas
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - banco-network
    depends_on:
      - ms-clientes

networks:
  banco-network:
    driver: bridge
