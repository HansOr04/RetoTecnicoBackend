server.port=8082

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:cuentasdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console deshabilitada en Docker/produccion
spring.h2.console.enabled=false

# Deshabilitado para evitar lazy loads silenciosos durante serialización JSON
# y hacer los límites transaccionales explícitos y predecibles.
spring.jpa.open-in-view=false

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
